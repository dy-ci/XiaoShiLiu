name: xsl
services:
  postgres:
    image: postgres:15-alpine
    container_name: xsl-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: xiaoshiliu
      TZ: Asia/Shanghai
    volumes:
      - pg_data:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - xsl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d xiaoshiliu"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xsl-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
      - /etc/localtime:/etc/localtime:ro
    networks:
      - xsl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./express-project
      dockerfile: Dockerfile
    container_name: xsl-backend
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      NODE_ENV: development
    ports:
      - "3013:3013"
    volumes:
      - ./express-project:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
      - /etc/localtime:/etc/localtime:ro
      - ./.env:/app/.env:ro
      - ./express-project/keys:/app/keys:ro
    networks:
      - xsl-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npx","nodemon","app.js"]

volumes:
  pg_data:
  redis_data:
  backend_uploads:

networks:
  xsl-network:
