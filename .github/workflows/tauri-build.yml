name: Build Tauri App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 桌面端构建（macOS / Linux / Windows）
  publish-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            os: aarch64-apple-darwin
          - platform: ubuntu-latest
            os: x86_64-unknown-linux-gnu
          - platform: windows-latest
            os: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os }}

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            vue3-project/src-tauri/target/
          key: tauri-${{ runner.os }}-${{ hashFiles('vue3-project/src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue3-project/package-lock.json

      - name: Install frontend dependencies and build
        working-directory: vue3-project
        run: npm ci && npm run build

      - name: Setup Tauri signing key
        env:
          TAURI_PRIVATE_KEY_CONTENT: ${{ secrets.TAURI_PRIVATE_KEY }}
        working-directory: vue3-project
        run: |
          mkdir -p "$HOME/.tauri"
          echo "$TAURI_PRIVATE_KEY_CONTENT" > "$HOME/.tauri/com.zhaishis.dynamic.key"

      - name: Build Tauri app (${{ matrix.os }})
        working-directory: vue3-project
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: npm run tauri build -- --target ${{ matrix.os }} ${{ (matrix.os == 'x86_64-pc-windows-msvc') && '--bundles nsis' || '' }}

      - name: List build outputs
        shell: bash
        run: |
          echo "=== target/${{ matrix.os }}/release/ ==="
          find vue3-project/src-tauri/target/${{ matrix.os }}/release/ -maxdepth 4 -type f 2>/dev/null | head -30 || echo "目录不存在或为空"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-${{ matrix.os }}-${{ github.sha }}
          path: vue3-project/src-tauri/target/${{ matrix.os }}/release/bundle/
          if-no-files-found: warn
          retention-days: 30

  # Android 构建
  publish-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;27.0.11902837"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            vue3-project/src-tauri/target/
          key: tauri-android-${{ hashFiles('vue3-project/src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-android-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue3-project/package-lock.json

      - name: Install frontend dependencies and build
        working-directory: vue3-project
        run: npm ci && npm run build

      - name: Initialize Android project
        working-directory: vue3-project
        run: npx tauri android init

      - name: Setup Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > /tmp/dynamic.jks
          mkdir -p vue3-project/src-tauri/gen/android
          cat > vue3-project/src-tauri/gen/android/keystore.properties << EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=dyci
          storeFile=/tmp/dynamic.jks
          EOF

      - name: Build Android App
        working-directory: vue3-project
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.11902837
        run: npm run tauri android build -- --target aarch64

      - name: List build outputs
        shell: bash
        run: |
          echo "=== target/aarch64-linux-android/release/ ==="
          find vue3-project/src-tauri/target/aarch64-linux-android/release/ -maxdepth 5 -type f 2>/dev/null | head -40 || echo "目录不存在或为空"
          echo ""
          echo "=== gen/android/ ==="
          find vue3-project/src-tauri/gen/android/ -maxdepth 6 -type f \( -name "*.apk" -o -name "*.aab" \) 2>/dev/null | head -20 || echo "未找到 APK/AAB"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-aarch64-linux-android-${{ github.sha }}
          path: |
            vue3-project/src-tauri/gen/android/app/build/outputs/apk/
            vue3-project/src-tauri/gen/android/app/build/outputs/bundle/
          retention-days: 30

  # iOS 构建
  publish-ios:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Xcode (iOS)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            vue3-project/src-tauri/target/
          key: tauri-ios-${{ hashFiles('vue3-project/src-tauri/Cargo.lock') }}
          restore-keys: |
            tauri-ios-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vue3-project/package-lock.json

      - name: Install frontend dependencies and build
        working-directory: vue3-project
        run: npm ci && npm run build

      - name: Build iOS App
        working-directory: vue3-project
        run: npx tauri ios build --target aarch64

      - name: List build outputs
        shell: bash
        run: |
          echo "=== target/aarch64-apple-ios/release/ ==="
          find vue3-project/src-tauri/target/aarch64-apple-ios/release/ -maxdepth 5 -type f 2>/dev/null | head -30 || echo "目录不存在或为空"
          echo ""
          echo "=== gen/apple/ ==="
          find vue3-project/src-tauri/gen/apple/ -maxdepth 6 -type f \( -name "*.ipa" \) 2>/dev/null | head -10 || echo "未找到 IPA"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dynamic-aarch64-apple-ios-${{ github.sha }}
          path: |
            vue3-project/src-tauri/gen/apple/
          retention-days: 30

  release:
    needs: [publish-desktop, publish-android, publish-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
